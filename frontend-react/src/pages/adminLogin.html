<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
ScanMark
<div class="header-actions">
  <button onclick="openProfile()">My Profile</button>
  <button onclick="history.back()">Back</button>
  <a href="index.html" onclick="logout()">Logout</a>
</div>
</header>

<div class="container">
<div class="box">

<h2>Admin Panel</h2>

<h3>Add Student</h3>
<input id="sid" placeholder="Student ID">
<input id="sname" placeholder="Name">
<input id="semail" placeholder="Email">
<input id="sphone" placeholder="Phone Number">
<input id="spass" placeholder="Password">
<button class="btn" onclick="addStudent()">Add Student</button>

<hr>

<h3>Add Faculty</h3>
<input id="fid" placeholder="Faculty ID">
<input id="fname" placeholder="Name">
<input id="femail" placeholder="Email">
<input id="fphone" placeholder="Phone Number">
<input id="fpass" placeholder="Password">
<button class="btn" onclick="addFaculty()">Add Faculty</button>

</div>
</div>

<footer>© 2026</footer>

<script type="module">
import { postData } from "./api.js";

// ✅ Set role/userId (assumption: adminId is stored at login time)
const aidLocal = localStorage.getItem("adminId");
if (aidLocal) {
  localStorage.setItem("role", "admin");
  localStorage.setItem("userId", aidLocal);
}

function openProfile() {
  window.location.href = "adminProfile.html";
}

function logout() {
  localStorage.removeItem("role");
  localStorage.removeItem("userId");
  localStorage.removeItem("adminId");
}

async function addStudent(){
  const res = await postData("/auth/add-student",{
    studentId: document.getElementById("sid").value,
    name: document.getElementById("sname").value,
    email: document.getElementById("semail").value,
    phone: document.getElementById("sphone").value,
    password: document.getElementById("spass").value
  });

  alert(res.message);
}

async function addFaculty(){
  const res = await postData("/auth/add-faculty",{
    facultyId: document.getElementById("fid").value,
    name: document.getElementById("fname").value,
    email: document.getElementById("femail").value,
    phone: document.getElementById("fphone").value,
    password: document.getElementById("fpass").value
  });

  alert(res.message);
}

window.openProfile = openProfile;
window.logout = logout;
window.addStudent = addStudent;
window.addFaculty = addFaculty;
</script>

</body>
</html>
